<!DOCTYPE html>
<html>
<head>
    <title>ML Weather Predictor</title>
    <link rel="stylesheet" href="/static/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="app">
        <h2>ML Weather Predictor</h2>
        <div class="input-group">
            <input type="number" id="humidity" placeholder="Humidity (%)">
            <input type="number" id="pressure" placeholder="Pressure (hPa)">
            <input type="number" id="wind" placeholder="Wind Speed (km/h)">
        </div>
        <button onclick="predict()">Predict Temperature</button>
        <div id="result">---</div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
